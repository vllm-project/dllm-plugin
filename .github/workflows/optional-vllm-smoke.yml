# Manual run: plugin + optional vLLM extra (default CI skips --extra vllm).
name: Optional vLLM smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vllm-extra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          python-version: "3.12"
      - name: Sync with vllm extra (locked)
        run: uv sync --locked --group dev --extra vllm
      - name: Tests
        run: uv run pytest -q
