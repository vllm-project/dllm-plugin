# SPDX-License-Identifier: Apache-2.0
# Manual run: plugin + optional vLLM extra (default CI skips --extra vllm).
#
# Known limitations (cpu-only ubuntu-latest):
# - Success depends on vLLM's published wheels and version pins in uv.lock.
#   Sync or tests may fail if no compatible wheel exists for this runner.
# - Maintainers: run workflow_dispatch once after changing the vllm extra and
#   record the outcome in PR notes or release docs if this becomes a gate.
#
# Verifying before merge: ``workflow_dispatch`` is not available until this file
# is on the default branch. To exercise ``ubuntu-latest`` from a PR, you can
# temporarily add ``on: pull_request`` with ``paths: [this file]``, push, record
# the Actions run URL on the PR, then revert to ``workflow_dispatch`` only (see
# CONTRIBUTING.md).
name: Optional vLLM smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vllm-extra:
    runs-on: ubuntu-latest
    steps:
      # Pinned release: https://github.com/actions/checkout/releases/tag/v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        # Pinned release: https://github.com/astral-sh/setup-uv/releases/tag/v7.6.0
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.12"
      - name: Sync with vllm extra (locked)
        run: uv sync --locked --group dev --extra vllm
      - name: Tests
        run: uv run pytest -q
