# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      # Pinned release: https://github.com/actions/checkout/releases/tag/v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        # Pinned release: https://github.com/astral-sh/setup-uv/releases/tag/v7.6.0
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync environment (locked, dev)
        run: uv sync --locked --group dev
      - name: Pre-commit (lint, format, types, lockfile)
        run: uv run pre-commit run --all-files
      - name: Tests
        run: uv run pytest -q
