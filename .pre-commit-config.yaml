# Ruff and ty run via ``uv run`` (versions from uv.lock); lockfile drift via uv sync --locked.
# Requires `uv` on PATH. Run pre-commit from the plugin repo root (``cd dllm-plugin`` if needed).
# See CONTRIBUTING.md.
default_install_hook_types:
  - pre-commit
  - prepare-commit-msg
repos:
  - repo: local
    hooks:
      - id: uv-sync-locked
        name: uv sync --locked (dev)
        entry: uv sync --locked --group dev
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check vllm_dllm_plugin tests
        language: system
        pass_filenames: false
        files: ^(vllm_dllm_plugin|tests)/.*\.py$|^pyproject\.toml$
      - id: ruff-format
        name: ruff format --check
        entry: uv run ruff format --check vllm_dllm_plugin tests
        language: system
        pass_filenames: false
        files: ^(vllm_dllm_plugin|tests)/.*\.py$|^pyproject\.toml$
      - id: ty-check
        name: ty check
        entry: uv run ty check
        language: system
        pass_filenames: false
        files: ^vllm_dllm_plugin/.*\.py$|^pyproject\.toml$
      - id: git-signoff
        name: git-signoff (commit message)
        description: Adds a 'Signed-off-by:' trailer to the commit message (DCO).
        entry: sh
        args: [scripts/add-signoff.sh]
        language: system
        always_run: true
        stages: [prepare-commit-msg]
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
        files: ^\.github/workflows/.*\.ya?ml$
